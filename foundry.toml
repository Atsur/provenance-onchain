[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
solc_version = "0.8.23"
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "paris"
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
    "forge-std/=lib/forge-std/src/"
]

[profile.ci]
fuzz = { runs = 100 }
invariant = { runs = 10 }

[profile.lite]
optimizer = false
via_ir = false

[profile.optimized]
optimizer = true
optimizer_runs = 1000000
via_ir = true

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
int_types = "long"
multiline_func_args = "vertical"

[doc]
out = "docs"

